name: Release Example

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-example-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devops-starter-kit

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $version"
            echo "Expected format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-and-publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs:
      - validate-version
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: examples/docker
          file: examples/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.validate-version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=DevOps Starter Kit
            org.opencontainers.image.version=${{ needs.validate-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            BUILD_VERSION=${{ needs.validate-version.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - build-and-publish
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release notes
        run: |
          cat > release-notes.md <<'MARKDOWN'
          ## Summary

          - Published Docker image to GitHub Container Registry.
          - Created release from a semantic version tag.

          ## Image

          ```text
          ghcr.io/${{ github.repository_owner }}/devops-starter-kit:${{ needs.validate-version.outputs.version }}
          ```
          MARKDOWN

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          name: Release ${{ needs.validate-version.outputs.version }}
          body_path: release-notes.md
