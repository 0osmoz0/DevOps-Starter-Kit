name: Docs Quality Example

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-quality-example-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  markdown:
    name: Markdown quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint Markdown files
        run: |
          mapfile -t files < <(git ls-files "*.md")

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Markdown files found."
            exit 0
          fi

          npx --yes markdownlint-cli "${files[@]}"

  yaml:
    name: YAML quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Lint YAML files
        run: |
          mapfile -t files < <(git ls-files "*.yml" "*.yaml")

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No YAML files found."
            exit 0
          fi

          yamllint "${files[@]}"

  workflows:
    name: GitHub Actions quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          cd "$RUNNER_TEMP"
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflows
        run: |
          "$RUNNER_TEMP/actionlint" -color
