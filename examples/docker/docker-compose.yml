services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-starter-kit/docker-example:local
    container_name: docker-example-app
    environment:
      APP_ENV: development
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
